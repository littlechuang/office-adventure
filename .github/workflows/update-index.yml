name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.md
        run: |
          cd contributors
          ls -1 *.md | grep -v '^_' | grep -v '^index.md' | sort > index.md

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a clean gh-pages deploy
          mkdir -p /tmp/deploy
          cp index.html /tmp/deploy/
          cp -r contributors /tmp/deploy/
          cp LICENSE /tmp/deploy/ 2>/dev/null || true

          # Switch to gh-pages branch (create if needed)
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          cp -r /tmp/deploy/* .
          git add -A
          git commit -m "deploy: auto-generated from main"
          git push origin HEAD:gh-pages --force
